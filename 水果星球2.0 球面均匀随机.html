<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粒子星球手势交互控制</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #container { position: relative; width: 100vw; height: 100vh; }
        #video-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 240px;
            height: 180px;
            border: 2px solid rgba(255, 165, 0, 0.5);
            border-radius: 8px;
            overflow: hidden;
            transform: scaleX(-1);
            z-index: 10;
        }
        #input_video { width: 100%; height: 100%; object-fit: cover; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            text-shadow: 0 0 5px rgba(0,0,0,0.8);
        }
        .instruction { font-size: 14px; opacity: 0.8; margin-top: 5px; }
        #status { color: #ffa500; font-weight: bold; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="container">
    <div id="ui">
        <h1>果切粒子星球</h1>
        <div id="status">正在加载 MediaPipe...</div>
        <div class="instruction">✋ 旋转手掌：同步旋转星球</div>
        <div class="instruction">✊ 握拳远去：快速拉远 (先慢后快)</div>
        <div class="instruction">🖐️ 五指张开靠近：快速推进 (先快后慢)</div>
    </div>

    <div id="video-container">
        <video id="input_video"></video>
    </div>
</div>

<script>
    // --- 配置与变量 ---
    let scene, camera, renderer, ring1;
    let planetGroups = []; // 存放各水果粒子组
    let targetRotationX = 0, targetRotationY = 0;
    let currentRotationX = 0, currentRotationY = 0;
    let targetDistance = 15;
    let currentDistance = 30;
    const minDistance = 5;
    const maxDistance = 60;

    const videoElement = document.getElementById('input_video');
    const statusElement = document.getElementById('status');

    // =====================================================================
    // 【关键配置】：在这里填写你项目中所有水果 PNG 的路径
    // 每张图对应的粒子数量可以通过 count 字段调整
    // =====================================================================
    const fruitTextures = [
        { path: './apricot.png',  count: 1500 }, // 杏子
        { path: './avocado.png',      count: 1500 }, // 牛油果（示例，按实际文件名替换）
        { path: './fig.png',     count: 1500 }, // 无花果
        { path: './plum.png',       count: 1500 }, // 李子
        { path: './mango.png',      count: 1000 }, // 芒果
        { path: './apple.png',      count: 1000 }, // 苹果
        { path: './strawberry.png',      count: 1000 }, // 草莓
        { path: './watermelon.png',      count: 1000 }, // 西瓜
        { path: './durian.png',      count: 1000 }, // 榴莲
    ];
    // 若某张图加载失败，Three.js 会自动降级为白色方块粒子，不影响整体运行。
    // =====================================================================

    // --- 初始化 Three.js ---
    function initThree() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = currentDistance;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('container').appendChild(renderer.domElement);

        const textureLoader = new THREE.TextureLoader();
        const radius = 5;

        // 计算所有图片的总粒子数，用于均匀铺满球面
        const totalCount = fruitTextures.reduce((sum, f) => sum + f.count, 0);

        // 预先生成所有球面位置，按顺序分配给各水果
        const allPositions = [];
        for (let i = 0; i < totalCount; i++) {
            const phi   = Math.acos(2 * Math.random() - 1);  // 避免两极堆积
            const theta = Math.random() * Math.PI * 2;
            const r = radius + (Math.random() - 0.5) * 0.4;
            allPositions.push([
                r * Math.sin(phi) * Math.cos(theta),
                r * Math.sin(phi) * Math.sin(theta),
                r * Math.cos(phi)
            ]);
        }

        // 为每种水果图片创建独立的 Points 对象
        let offset = 0;
        fruitTextures.forEach(({ path, count }) => {
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);

            for (let i = 0; i < count; i++) {
                const p = allPositions[offset + i];
                pos[i * 3]     = p[0];
                pos[i * 3 + 1] = p[1];
                pos[i * 3 + 2] = p[2];
            }
            offset += count;

            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));

            const mat = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.22,
                transparent: true,
                blending: THREE.AdditiveBlending,
                map: textureLoader.load(path),
                depthWrite: false,
                sizeAttenuation: true,
            });

            const points = new THREE.Points(geo, mat);
            scene.add(points);
            planetGroups.push(points);
        });

        // ── 单星环（已移除 ring2）──
        function createRing(inner, outer, count, tiltX, tiltZ) {
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            // 星环粒子复用第一张水果贴图，保持视觉统一
            const ringTexture = textureLoader.load(fruitTextures[0].path);
            for (let i = 0; i < count; i++) {
                const r     = inner + Math.random() * (outer - inner);
                const angle = Math.random() * Math.PI * 2;
                pos[i * 3]     = Math.cos(angle) * r;
                pos[i * 3 + 1] = (Math.random() - 0.5) * 0.2;
                pos[i * 3 + 2] = Math.sin(angle) * r;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const mat = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.08,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending,
                map: ringTexture,
                depthWrite: false
            });
            const points = new THREE.Points(geo, mat);
            points.rotation.x = tiltX;
            points.rotation.z = tiltZ;
            return points;
        }

        ring1 = createRing(7, 9, 3000, Math.PI / 3, 0.2);
        scene.add(ring1);
        // ring2 已删除 ✅

        window.addEventListener('resize', onWindowResize, false);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // --- MediaPipe 手势逻辑 ---
    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7
    });

    hands.onResults(onResults);

    function onResults(results) {
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            statusElement.innerText = "手势控制已激活";
            const landmarks = results.multiHandLandmarks[0];

            const wrist     = landmarks[0];
            const indexBase = landmarks[5];
            const indexTip  = landmarks[8];
            const middleTip = landmarks[12];
            const ringTip   = landmarks[16];
            const pinkyTip  = landmarks[20];

            targetRotationY = (landmarks[0].x - 0.5) * 4;
            targetRotationX = (landmarks[0].y - 0.5) * 4;

            const tips = [indexTip, middleTip, ringTip, pinkyTip];
            let distSum = 0;
            tips.forEach(tip => {
                const d = Math.sqrt(
                    Math.pow(tip.x - wrist.x, 2) +
                    Math.pow(tip.y - wrist.y, 2)
                );
                distSum += d;
            });
            const isFist = distSum < 0.6;

            const palmWidth = Math.abs(indexBase.x - landmarks[17].x);

            if (isFist) {
                if (palmWidth < 0.15) targetDistance += 0.5;
            } else {
                if (palmWidth > 0.25) targetDistance -= 0.8;
            }

            targetDistance = Math.max(minDistance, Math.min(maxDistance, targetDistance));
        } else {
            statusElement.innerText = "未检测到手部";
        }
    }

    const cameraControl = new Camera(videoElement, {
        onFrame: async () => {
            await hands.send({ image: videoElement });
        },
        width: 640,
        height: 480
    });
    cameraControl.start();

    // --- 动画循环 ---
    function animate() {
        requestAnimationFrame(animate);

        currentRotationX += (targetRotationX - currentRotationX) * 0.05;
        currentRotationY += (targetRotationY - currentRotationY) * 0.05;

        let distDiff = targetDistance - currentDistance;
        let distStep;
        if (distDiff > 0) {
            distStep = distDiff * 0.02 + (distDiff * distDiff * 0.005);
        } else {
            distStep = distDiff * 0.1;
        }
        currentDistance += distStep;

        camera.position.x =  currentDistance * Math.sin(currentRotationY) * Math.cos(currentRotationX);
        camera.position.y = -currentDistance * Math.sin(currentRotationX);
        camera.position.z =  currentDistance * Math.cos(currentRotationY) * Math.cos(currentRotationX);
        camera.lookAt(0, 0, 0);

        // 所有水果粒子组同步自转
        planetGroups.forEach(p => { p.rotation.y += 0.002; });
        ring1.rotation.y -= 0.001;

        renderer.render(scene, camera);
    }

    window.onload = () => {
        initThree();
        animate();
    };
</script>
</body>
</html>
